server:
  port: 8080

spring:
  application:
    name: whatsapp-saas
  
  datasource:
    url: jdbc:postgresql://localhost:5433/whatsapp_saas?sslmode=disable
    username: saas_admin
    password: saas_password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: saas-default-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      
app:
  jwt:
    secret: "productionReadySecretKeyWithAtLeast32BytesLengthForHmacSha256AsFallback"
    expirationMs: 86400000

whatsapp:
  verify:
    token: "my-secret-token"

openai:
  api:
    key: ${OPENAI_API_KEY:dummy_key_for_build}
