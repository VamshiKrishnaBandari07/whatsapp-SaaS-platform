apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-saas-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp-saas
  template:
    metadata:
      labels:
        app: whatsapp-saas
    spec:
      containers:
      - name: saas-application
        image: <YOUR_REGISTRY>/whatsapp-saas-platform:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://<POSTGRES_HOST>:5432/whatsapp_saas"
        - name: SPRING_DATASOURCE_USERNAME
          value: "saas_admin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "saas_password"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "<KAFKA_HOST>:9092"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-secret
              key: key
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
